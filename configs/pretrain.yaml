model:
  bert_model: "bert-base-uncased"
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  hidden_dropout_prob: 0.1

image:
  encoder_type: "resnet50"
  img_size: 512
  num_image_embeds: 180
  img_embed_pool_type: "max"
  img_hidden_sz: 2048

data:
  train_path: "data/mimic/train.jsonl"
  val_path: "data/mimic/val.jsonl"
  seq_len: 253
  max_seq_len: 512
  num_workers: 4

training:
  output_dir: "outputs/pretrain"
  epochs: 50
  batch_size: 32
  lr: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  fp16: true
  seed: 42
  logging_steps: 100
  save_steps: 2000

mlm_prob: 0.15
itm_prob: 0.5
bi_prob: 0.5
s2s_prob: 0.5
task: "pretrain"
